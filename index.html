<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Web Site Gallery</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./assets/css/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <p class="site-header__subtitle">GitHub Pages / TKG-afk</p>
        <h1>My Web Site Gallery</h1>
        <p class="site-header__lead">公開中のGitHub Pagesサイトを、作成日時の新しい順に並べたポータルです。画像をクリックすると各サイトのトップページを開きます。</p>
      </div>
    </header>

    <main class="gallery-shell">
      <section class="gallery-heading" aria-labelledby="gallery-title">
        <div>
          <p class="gallery-heading__eyebrow">Published Sites</p>
          <h2 id="gallery-title">Website Gallery</h2>
        </div>
        <p class="site-count" id="site-count" aria-live="polite">0 Sites</p>
      </section>

      <section class="gallery-panel" aria-label="GitHub Pages site list">
        <div class="gallery-grid" id="gallery-grid"></div>
        <p class="empty-state" id="empty-state" hidden>表示できるGitHub Pagesサイトがありません。</p>
      </section>
    </main>

    <template id="site-card-template">
      <article class="site-card">
        <a class="thumbnail-button" target="_blank" rel="noopener noreferrer">
          <img alt="" loading="lazy">
          <span class="thumbnail-button__label">Open Site</span>
        </a>
        <div class="site-card__body">
          <time></time>
          <h3></h3>
          <p class="site-card__description"></p>
          <div class="site-card__actions">
            <a class="button button--primary" target="_blank" rel="noopener noreferrer">サイトを見る</a>
            <a class="button button--secondary" target="_blank" rel="noopener noreferrer">GitHub</a>
          </div>
        </div>
      </article>
    </template>

    <script src="./assets/js/app.js" defer></script>
  </body>
</html>
